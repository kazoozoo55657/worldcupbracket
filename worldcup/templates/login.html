{% extends "base.html" %}
{% block title %}Log in{% endblock %}
{% block body %}
<section class="card narrow">
  <h1>Log in</h1>
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
  <form method="post" action="/login" class="stack">
    <input type="hidden" name="csrf_token" value="{{ csrf }}">
    <label>Bracket name
      <input name="bracket_name" required maxlength="40">
    </label>
    <label>PIN
      <input name="pin" inputmode="numeric" pattern="\d{4,6}" required autocomplete="off">
    </label>
    <button type="submit" class="primary">Log in</button>
  </form>
  <p class="muted">No bracket yet? <a href="/join">Join the pool</a>.</p>
  <p class="muted">Forgotten your PIN? Contact Cole.</p>
</section>
{% endblock %}
