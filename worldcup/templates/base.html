<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}World Cup 2026 Pool{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css?v={{ static_ver }}">
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
</head>
<body>
<header class="topbar">
  <a class="brand" href="/">⚽ <span>World&nbsp;Cup&nbsp;2026</span> Pool</a>
  <a class="navlink" href="/">Home</a>
  {% if session %}
    <a class="navlink" href="/bracket">My Bracket</a>
    <details class="menu">
      <summary class="hamburger" aria-label="Menu" title="Menu">☰</summary>
      <div class="menu-pop">
        <a href="/account">Account</a>
        {% if session.a %}<a href="/admin">Admin</a>{% endif %}
        <form method="post" action="/logout">
          <input type="hidden" name="csrf_token" value="{{ csrf }}">
          <button class="linkish" type="submit">Log out</button>
        </form>
      </div>
    </details>
  {% else %}
    <a class="navlink" href="/login">Log in</a>
    <a class="cta" href="/join">Join</a>
  {% endif %}
</header>
<main>
  {% block body %}{% endblock %}
</main>
<footer class="foot">Hosted on Yggdrasil · picks lock at kickoff</footer>
<script>
  // Close the top-right dropdown when clicking anywhere outside it.
  document.addEventListener("click", function (e) {
    document.querySelectorAll("details.menu[open]").forEach(function (d) {
      if (!d.contains(e.target)) d.removeAttribute("open");
    });
  });
</script>
</body>
</html>
