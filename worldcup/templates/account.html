{% extends "base.html" %}
{% block title %}Account{% endblock %}
{% block body %}
<section class="card narrow">
  <h1>Account</h1>
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
  <form method="post" action="/account" class="stack">
    <input type="hidden" name="csrf_token" value="{{ csrf }}">
    <label>Bracket name
      <input name="bracket_name" required maxlength="40" value="{{ member.bracket_name }}">
    </label>
    <label>Your name <span class="hint">(shown in parentheses)</span>
      <input name="owner_name" required maxlength="40" value="{{ member.owner_name or '' }}">
    </label>
    <button type="submit" class="primary">Save changes</button>
  </form>
</section>

<section class="card narrow danger-zone">
  <h2>Delete bracket</h2>
  <p class="muted small">Permanently deletes <b>{{ member.bracket_name }}</b> and all of its picks.
     This can't be undone.</p>
  <form method="post" action="/account/delete"
        onsubmit="return confirm('Delete your bracket “{{ member.bracket_name }}” and all its picks? This cannot be undone.');">
    <input type="hidden" name="csrf_token" value="{{ csrf }}">
    <button type="submit" class="danger">Delete my bracket</button>
  </form>
</section>
{% endblock %}
